name: Daily Hotspot Content

on:
  schedule:
    # 02:00 UTC = 10:00 Asia/Shanghai
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-hotspot-content
  cancel-in-progress: false

jobs:
  generate:
    name: Fetch, score, and generate drafts
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      USE_LLM: ${{ vars.USE_LLM || 'false' }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ vars.LLM_BASE_URL || 'https://api.openai.com/v1/chat/completions' }}
      LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4o-mini' }}
      LLM_TEMPERATURE: ${{ vars.LLM_TEMPERATURE || '0.7' }}
      LLM_MAX_TOKENS: ${{ vars.LLM_MAX_TOKENS || '3000' }}
      SUMMARY_WEBHOOK_URL: ${{ secrets.SUMMARY_WEBHOOK_URL }}
      SUMMARY_WEBHOOK_TYPE: ${{ vars.SUMMARY_WEBHOOK_TYPE || 'generic' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch hotspots
        run: python scripts/fetch_hotspots.py

      - name: Score hotspots
        run: python scripts/score_hotspots.py

      - name: Generate content drafts
        run: python scripts/generate_content.py

      - name: Export today package
        run: python scripts/export_today_package.py

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/
          if git diff --cached --quiet; then
            echo "No generated output changes to commit."
          else
            git commit -m "chore: add daily hotspot outputs"
            git push
          fi

      - name: Send daily summary
        run: python scripts/send_summary.py
